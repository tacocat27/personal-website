<svg id="dog-svg" xmlns="http://www.w3.org/2000/svg" width="220" height="180" viewBox="0 0 220 180">
  <ellipse cx="110" cy="150" rx="70" ry="12" fill="#e8dcc8" opacity="0.6"/>
